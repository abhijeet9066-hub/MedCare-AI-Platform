version: "3.9"

services:

  db:
    image: postgres:16
    container_name: medcare_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sonet9066
      POSTGRES_DB: medcare_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: medcare_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:Sonet9066@db:5432/medcare_ai
      SECRET_KEY: medcare_ai_ultra_secure_secret_2026_xyz_987654321
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"

volumes:
  postgres_data: